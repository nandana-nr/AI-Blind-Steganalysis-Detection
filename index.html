<!DOCTYPE html>
<html>
<head>
    <title>Blind Steganalysis Detection System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="header">
    <div class="logo">🔒</div>
    <div>
        <h1>Blind Steganalysis Detection System</h1>
        <p>A modern machine learning system to detect hidden information embedded in digital images</p>
    </div>
</div>

<div class="container">

    <div class="card">

        <h2>Upload Image</h2>

        <form method="POST" enctype="multipart/form-data">

            <input type="file" name="image" required>

            <br><br>

            <button type="submit">Upload Image</button>

        </form>

    </div>


    <div class="card">

        <h2>Detection Result</h2>

        {% if result %}
            <div class="result">{{ result }}</div>
        {% endif %}

    </div>

</div>

</body>
</html>
